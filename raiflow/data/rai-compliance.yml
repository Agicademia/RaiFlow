name: RAI Compliance Gate

on:
  pull_request:
    branches:
      - main

jobs:
  pre-commit-checks:
    name: Pre-Commit Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Run pre-commit compliance checks
        run: raiflow check --stage pre-commit

  compliance-gate:
    name: Compliance Gate (CI)
    runs-on: ubuntu-latest
    needs: pre-commit-checks
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Run CI compliance checks
        run: raiflow check --stage ci --output raiflow-report.json

      - name: Upload compliance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raiflow-report
          path: raiflow-report.json

  build-and-sign:
    name: Build and Sign Artifact Manifest
    runs-on: ubuntu-latest
    needs: compliance-gate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Download compliance report artifact
        uses: actions/download-artifact@v4
        with:
          name: raiflow-report

      - name: Write artifact manifest with SHA-256
        env:
          SYSTEM_NAME: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import hashlib, json, os

          report_path = "raiflow-report.json"

          with open(report_path, "rb") as f:
              report_bytes = f.read()

          sha256 = hashlib.sha256(report_bytes).hexdigest()

          with open(report_path) as f:
              report = json.load(f)

          manifest = {
              "system_name": report.get("system_name", os.environ.get("SYSTEM_NAME", "")),
              "git_sha": os.environ.get("GITHUB_SHA", ""),
              "compliance_report_path": report_path,
              "compliance_report_sha256": sha256,
          }

          with open("artifact-manifest.json", "w") as f:
              json.dump(manifest, f, indent=2, sort_keys=True)

          print(f"Artifact manifest written: {json.dumps(manifest, indent=2)}")
          EOF

      - name: Upload artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: artifact-manifest
          path: artifact-manifest.json

  deploy-gate:
    name: Deploy Gate (Pre-Deploy)
    runs-on: ubuntu-latest
    needs: build-and-sign
    env:
      COMPLIANCE_NOTIFY_EMAIL: ${{ vars.COMPLIANCE_NOTIFY_EMAIL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e .

      - name: Run pre-deploy compliance checks
        id: pre_deploy
        run: raiflow check --stage pre-deploy --output raiflow-report-predeploy.json
        continue-on-error: true

      - name: Post failure summary to GitHub Actions
        if: steps.pre_deploy.outcome == 'failure'
        run: |
          echo "## ❌ Pre-Deploy Compliance Gate Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The \`raiflow check --stage pre-deploy\` check failed." >> $GITHUB_STEP_SUMMARY
          echo "Review \`raiflow-report-predeploy.json\` for details on which articles failed." >> $GITHUB_STEP_SUMMARY
          if [ -n "$COMPLIANCE_NOTIFY_EMAIL" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Notification will be sent to: \`$COMPLIANCE_NOTIFY_EMAIL\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail job on pre-deploy check failure
        if: steps.pre_deploy.outcome == 'failure'
        run: exit 1
