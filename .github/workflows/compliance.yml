name: EU AI Act Compliance CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
          pip install httpx hypothesis

      - name: Run unit tests
        env:
          RAIFLOW_MOCK_LLM: "true"
        run: |
          python -m pytest tests/ -v --cov=raiflow --cov-report=xml

      - name: Run EU AI Act compliance tests
        env:
          RAIFLOW_MOCK_LLM: "true"
        run: |
          python -m pytest tests/eu_ai_act_test.py -v --tb=short

      - name: Generate compliance report
        run: |
          python examples/generate_report.py

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-report
          path: compliance_report.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scan
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r raiflow/ -f json -o bandit-report.json

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan
          path: bandit-report.json

  deploy-staging:
    needs: [compliance-check, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here
          # For example:
          # docker build -t raiflow:staging .
          # docker push raiflow:staging
          # kubectl apply -f k8s/staging/

  deploy-production:
    needs: [compliance-check, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your deployment commands here
          # For example:
          # docker build -t raiflow:latest .
          # docker push raiflow:latest
          # kubectl apply -f k8s/production/
